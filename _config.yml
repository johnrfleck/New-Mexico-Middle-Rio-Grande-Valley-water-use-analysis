# Jupyter Book configuration (classic v1 / Sphinx-based schema)

title: NM Middle Rio Grande Water Analysis
author: John Fleck & Bob Berrens
copyright: "2026, John Fleck and Bob Berrens"
logo: docs/logo.png

execute:
  execute_notebooks: 'off'
  timeout: 120
  allow_errors: false

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify

html:
  favicon: docs/logo.png
  use_issues_button: true
  use_repository_button: true

repository:
  url: https://github.com/johnrfleck/New-Mexico-Middle-Rio-Grande-Valley-water-use-analysis
  branch: main

sphinx:
  config:
    html_theme_options:
      navigation_with_keys: true
      extra_footer: |
        <p><a href="https://fleck-berrens.org" target="_blank">Fleck–Berrens Lab</a></p>
        <p>Code licensed
        <a href="https://github.com/johnrfleck/New-Mexico-Middle-Rio-Grande-Valley-water-use-analysis/blob/main/LICENSE">MIT</a>.
        Written content and figures licensed
        <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.</p>
